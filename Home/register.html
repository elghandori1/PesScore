<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PesScore - Register</title>
    <link rel="stylesheet" href="../Assets/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="pc-warning">
        <div>
            <h2>PesScore is designed for mobile and tablet use only</h2>
            <p>Please open this app on a mobile device
        </div>
    </div>
    <div class="header">
      <h2 id="logoName">PesScore</h2>
      <div class="icons">
        <a href="/" class="back-link">Back to Home</a>
      </div>
    </div>
      <div id="error-message" class="error-message" style="display: none;">
          <span id="error-text"></span>
          <button type="button" id="close-error" onclick="closeErrorMessage()">×</button>
      </div>
  
    <main class="container">
        <section class="register-form">
          <div class="register-header">
            <h2>Register</h2>
            <a href="/login">Sign In</a>
          </div>
            <form action="/register" method="POST" id="registerForm">
                <label for="name">Name</label>
                <div class="name-part">
                  <input type="text" id="name" name="name" placeholder="Enter your name" />
                  <div class="errorMessages" id="nameError"></div>
                </div>
                
                <label for="account_name">Account Name</label>
                <div class="account_name-part">
                  <input type="text" id="account_name" name="account_name" placeholder="Enter account name" />
                  <div class="errorMessages" id="account_nameError"></div>
                </div>
                
                <label for="email">Email</label>
                <div class="email-part">
                  <input type="text" id="email" name="email" placeholder="Enter your email"  />
                  <div class="errorMessages" id="emailError"></div>

                </div>
                
                <label for="password">Password</label>
                <div class="password-part">
                  <input type="password" id="password" name="password" placeholder="Enter your password" />
                  <div class="errorMessages" id="passwordError"></div>
                </div>
                
                <label for="confirmPassword">Confirm Password</label>
                <div class="confirm-password-part">
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" />
                    <div class="errorMessages" id="confirmPasswordError"></div>
                </div>

                <button type="submit">Register</button>
            </form>
        </section>
    </main>
    <footer class="footer">
        PesScore © 2025 - Football Match Tracker
    </footer>
    <script src="../Assets/js/registerScript.js"></script>
  </body>
</html>
