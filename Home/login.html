<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PesScore - Sign In</title>
    <link rel="stylesheet" href="../Assets/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="pc-warning">
        <div>
            <h2>PesScore is designed for mobile and tablet use only</h2>
            <p>Please open this app on a mobile device or tablet for the best experience.</p>
        </div>
    </div>
    <div class="header">
      <h2 id="logoName">PesScore</h2>
      <div class="icons">
        <a href="/" class="back-link">Back to Home</a>
      </div>
    </div>
    <div id="serverNotification" class="notification" style="display: none;">
      <span id="notificationMessage"></span>
      <button id="closeNotification" class="close-btn">&times;</button>
  </div>
    <main class="container">
      <section class="login-form">
        <h2>Sign In</h2>
        <form action="/" method="POST" id="loginForm">
            <label for="email">Email</label>
            <input type="text" id="email" name="email" placeholder="Enter your email"/>
            </div>
            
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password"/>
            </div>
            
            <button type="submit">Sign In</button>
        </form>
        <p class="register-prompt">
            Don't have an account? <a href="/register" class="register-link">Register</a>
        </p>
    </section>
    </main>

    <footer class="footer">
        PesScore © 2025 - Football Match Tracker
    </footer>

    <script src="../Assets/js/loginScripts.js"></script>
  </body>
</html>
